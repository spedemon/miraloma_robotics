<svg viewBox="-50 -50 360 380" width="420" height="450" xmlns="http://www.w3.org/2000/svg">
  <!-- Sound waves (visible when listening) -->
  <circle class="sound-wave" cx="130" cy="120" r="100" fill="none" stroke="#FF6B35" stroke-width="2"/>
  <circle class="sound-wave" cx="130" cy="120" r="100" fill="none" stroke="#FF6B35" stroke-width="2"/>
  <circle class="sound-wave" cx="130" cy="120" r="100" fill="none" stroke="#FF6B35" stroke-width="2"/>

  <defs>
    <linearGradient id="spiderBodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B8C5A"/>
      <stop offset="100%" style="stop-color:#3D6B3D"/>
    </linearGradient>
    <linearGradient id="spiderLegGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B7B6B"/>
      <stop offset="100%" style="stop-color:#4A5A4A"/>
    </linearGradient>
    <radialGradient id="servoGrad">
      <stop offset="0%" style="stop-color:#FFD93D"/>
      <stop offset="70%" style="stop-color:#E8B800"/>
      <stop offset="100%" style="stop-color:#CC9900"/>
    </radialGradient>
    <radialGradient id="eyeGlowL">
      <stop offset="0%" style="stop-color:#4ECDC4; stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4ECDC4; stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="eyeGlowR">
      <stop offset="0%" style="stop-color:#FF6B9D; stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF6B9D; stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- === BACK LEGS (behind body) === -->

  <!-- Back-Left Leg -->
  <g class="spider-leg" style="transform-origin: 60px 180px; animation-delay: 0.3s;">
    <line x1="60" y1="180" x2="10" y2="220" stroke="url(#spiderLegGrad)" stroke-width="7" stroke-linecap="round"/>
    <circle cx="10" cy="220" r="5" fill="url(#servoGrad)" stroke="#AA8800" stroke-width="1.5"/>
    <line x1="10" y1="220" x2="-25" y2="270" stroke="url(#spiderLegGrad)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-25" cy="270" r="4" fill="#888" stroke="#666" stroke-width="1"/>
  </g>

  <!-- Back-Right Leg -->
  <g class="spider-leg" style="transform-origin: 200px 180px; animation-delay: 0.6s;">
    <line x1="200" y1="180" x2="250" y2="220" stroke="url(#spiderLegGrad)" stroke-width="7" stroke-linecap="round"/>
    <circle cx="250" cy="220" r="5" fill="url(#servoGrad)" stroke="#AA8800" stroke-width="1.5"/>
    <line x1="250" y1="220" x2="285" y2="270" stroke="url(#spiderLegGrad)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="285" cy="270" r="4" fill="#888" stroke="#666" stroke-width="1"/>
  </g>

  <!-- === BODY === -->

  <!-- Main body (rounded hexagonal shape) -->
  <ellipse cx="130" cy="140" rx="80" ry="65"
           fill="url(#spiderBodyGrad)" stroke="#2D5A2D" stroke-width="3"/>

  <!-- Body segments / shell details -->
  <ellipse cx="130" cy="120" rx="55" ry="35"
           fill="none" stroke="#4A7A4A" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="85" x2="130" y2="200" stroke="#4A7A4A" stroke-width="1" opacity="0.3"/>

  <!-- Antenna nubs -->
  <line x1="100" y1="80" x2="85" y2="60" stroke="#5B8C5A" stroke-width="3" stroke-linecap="round"/>
  <circle class="antenna-tip" cx="85" cy="58" r="4" fill="#FF6B35"/>
  <line x1="160" y1="80" x2="175" y2="60" stroke="#5B8C5A" stroke-width="3" stroke-linecap="round"/>
  <circle class="antenna-tip" cx="175" cy="58" r="4" fill="#FF6B35"/>

  <!-- Eye glow -->
  <circle cx="105" cy="118" r="28" fill="url(#eyeGlowL)"/>
  <circle cx="155" cy="118" r="28" fill="url(#eyeGlowR)"/>

  <!-- Eyes whites -->
  <circle class="robot-eye-white" cx="105" cy="118" r="18" fill="white"
          stroke="#2D5A2D" stroke-width="2"/>
  <circle class="robot-eye-white" cx="155" cy="118" r="18" fill="white"
          stroke="#2D5A2D" stroke-width="2"/>

  <!-- Pupils -->
  <circle class="robot-eye-pupil" cx="105" cy="118" r="8" fill="#2D3436"/>
  <circle class="robot-eye-pupil" cx="155" cy="118" r="8" fill="#2D3436"/>

  <!-- Pupil highlights -->
  <circle cx="109" cy="114" r="3" fill="white" opacity="0.9"/>
  <circle cx="159" cy="114" r="3" fill="white" opacity="0.9"/>

  <!-- Cheek blush -->
  <ellipse cx="82" cy="140" rx="10" ry="6" fill="#FFB8C6" opacity="0.4"/>
  <ellipse cx="178" cy="140" rx="10" ry="6" fill="#FFB8C6" opacity="0.4"/>

  <!-- Mouth -->
  <ellipse class="robot-mouth" cx="130" cy="155" rx="16" ry="8"
           fill="#FF6B9D" opacity="0.7"/>
  <ellipse cx="130" cy="153" rx="12" ry="4"
           fill="white" opacity="0.25"/>

  <!-- Body LEDs -->
  <circle cx="115" cy="180" r="4" fill="#4ECDC4" opacity="0.6"/>
  <circle cx="130" cy="183" r="4" fill="#FF6B35" opacity="0.6"/>
  <circle cx="145" cy="180" r="4" fill="#A855F7" opacity="0.6"/>

  <!-- === FRONT LEGS (in front of body) === -->

  <!-- Front-Left Leg -->
  <g class="spider-leg" style="transform-origin: 60px 115px; animation-delay: 0s;">
    <line x1="60" y1="115" x2="5" y2="95" stroke="url(#spiderLegGrad)" stroke-width="7" stroke-linecap="round"/>
    <circle cx="5" cy="95" r="5" fill="url(#servoGrad)" stroke="#AA8800" stroke-width="1.5"/>
    <line x1="5" y1="95" x2="-30" y2="145" stroke="url(#spiderLegGrad)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-30" cy="145" r="4" fill="#888" stroke="#666" stroke-width="1"/>
  </g>

  <!-- Front-Right Leg -->
  <g class="spider-leg" style="transform-origin: 200px 115px; animation-delay: 0.45s;">
    <line x1="200" y1="115" x2="255" y2="95" stroke="url(#spiderLegGrad)" stroke-width="7" stroke-linecap="round"/>
    <circle cx="255" cy="95" r="5" fill="url(#servoGrad)" stroke="#AA8800" stroke-width="1.5"/>
    <line x1="255" y1="95" x2="290" y2="145" stroke="url(#spiderLegGrad)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="290" cy="145" r="4" fill="#888" stroke="#666" stroke-width="1"/>
  </g>

  <!-- Thinking dots (visible when thinking) -->
  <g class="thinking-dots" transform="translate(130, 240)">
    <circle class="thinking-dot" cx="-16" cy="0" r="5" fill="#A855F7"/>
    <circle class="thinking-dot" cx="0" cy="0" r="5" fill="#A855F7"/>
    <circle class="thinking-dot" cx="16" cy="0" r="5" fill="#A855F7"/>
  </g>

  <!-- Gear icon (visible when thinking) -->
  <g class="gear-icon" transform="translate(220, 55)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#A855F7" stroke-width="3"/>
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#A855F7" stroke-width="3" stroke-linecap="round"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#A855F7" stroke-width="3" stroke-linecap="round"/>
    <line x1="-11" y1="-11" x2="11" y2="11" stroke="#A855F7" stroke-width="3" stroke-linecap="round"/>
    <line x1="11" y1="-11" x2="-11" y2="11" stroke="#A855F7" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
