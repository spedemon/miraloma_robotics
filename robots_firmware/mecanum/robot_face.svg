<svg viewBox="-50 -50 360 380" width="280" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Sound waves (visible when listening) -->
  <circle class="sound-wave" cx="130" cy="120" r="100" fill="none" stroke="#FF6B35" stroke-width="2"/>
  <circle class="sound-wave" cx="130" cy="120" r="100" fill="none" stroke="#FF6B35" stroke-width="2"/>
  <circle class="sound-wave" cx="130" cy="120" r="100" fill="none" stroke="#FF6B35" stroke-width="2"/>

  <defs>
    <linearGradient id="carBodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#2C5F9E"/>
    </linearGradient>
    <linearGradient id="carTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5BA0E8"/>
      <stop offset="100%" style="stop-color:#4A90D9"/>
    </linearGradient>
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#444"/>
      <stop offset="100%" style="stop-color:#222"/>
    </linearGradient>
    <linearGradient id="sensorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EDF2"/>
      <stop offset="100%" style="stop-color:#B0B8C4"/>
    </linearGradient>
    <radialGradient id="eyeGlowL">
      <stop offset="0%" style="stop-color:#4ECDC4; stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4ECDC4; stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="eyeGlowR">
      <stop offset="0%" style="stop-color:#FF6B9D; stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF6B9D; stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- === ULTRASOUND SENSOR HEAD (on top) === -->

  <!-- Sensor mount pole -->
  <rect x="123" y="40" width="14" height="30" rx="3" fill="#B0B8C4" stroke="#9CA8B4" stroke-width="1.5"/>

  <!-- Sensor head housing -->
  <rect x="85" y="12" width="90" height="35" rx="12" ry="12"
        fill="url(#sensorGrad)" stroke="#9CA8B4" stroke-width="2"/>

  <!-- Ultrasound transducer eyes -->
  <!-- Eye glow -->
  <circle cx="110" cy="30" r="22" fill="url(#eyeGlowL)"/>
  <circle cx="150" cy="30" r="22" fill="url(#eyeGlowR)"/>

  <!-- Eyes whites (transducer housings) -->
  <circle class="robot-eye-white" cx="110" cy="30" r="14" fill="white"
          stroke="#9CA8B4" stroke-width="2"/>
  <circle class="robot-eye-white" cx="150" cy="30" r="14" fill="white"
          stroke="#9CA8B4" stroke-width="2"/>

  <!-- Pupils (transducer cores) -->
  <circle class="robot-eye-pupil" cx="110" cy="30" r="6" fill="#2D3436"/>
  <circle class="robot-eye-pupil" cx="150" cy="30" r="6" fill="#2D3436"/>

  <!-- Pupil highlights -->
  <circle cx="113" cy="27" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="153" cy="27" r="2.5" fill="white" opacity="0.9"/>

  <!-- Ultrasound pulse waves -->
  <circle class="ultrasound-wave" cx="130" cy="30" r="20" fill="none" stroke="#4ECDC4" stroke-width="1.5"/>
  <circle class="ultrasound-wave" cx="130" cy="30" r="20" fill="none" stroke="#4ECDC4" stroke-width="1.5"/>

  <!-- Antenna on sensor -->
  <line x1="130" y1="12" x2="130" y2="-5" stroke="#B0B8C4" stroke-width="3" stroke-linecap="round"/>
  <circle class="antenna-tip" cx="130" cy="-7" r="5" fill="#FF6B35"/>

  <!-- Mouth (smile under sensor) -->
  <ellipse class="robot-mouth" cx="130" cy="42" rx="12" ry="5"
           fill="#FF6B9D" opacity="0.6"/>

  <!-- === CAR BODY === -->

  <!-- Main car body -->
  <rect x="40" y="80" width="180" height="110" rx="20" ry="20"
        fill="url(#carBodyGrad)" stroke="#1E4A80" stroke-width="3"/>

  <!-- Top panel accent -->
  <rect x="55" y="90" width="150" height="40" rx="12" ry="12"
        fill="url(#carTopGrad)" stroke="#3A7AC0" stroke-width="1.5" opacity="0.6"/>

  <!-- Headlights -->
  <circle cx="60" cy="105" r="8" fill="#FFD93D" opacity="0.8" stroke="#E8B800" stroke-width="1.5"/>
  <circle cx="60" cy="105" r="4" fill="white" opacity="0.6"/>
  <circle cx="200" cy="105" r="8" fill="#FFD93D" opacity="0.8" stroke="#E8B800" stroke-width="1.5"/>
  <circle cx="200" cy="105" r="4" fill="white" opacity="0.6"/>

  <!-- Cheek blush on car body -->
  <ellipse cx="65" cy="150" rx="12" ry="7" fill="#FFB8C6" opacity="0.35"/>
  <ellipse cx="195" cy="150" rx="12" ry="7" fill="#FFB8C6" opacity="0.35"/>

  <!-- Dashboard LEDs -->
  <circle cx="115" cy="100" r="4" fill="#4ECDC4" opacity="0.7"/>
  <circle cx="130" cy="100" r="4" fill="#FF6B35" opacity="0.7"/>
  <circle cx="145" cy="100" r="4" fill="#A855F7" opacity="0.7"/>

  <!-- Body label -->
  <text x="130" y="165" text-anchor="middle" fill="white" font-size="11"
        font-family="Outfit, sans-serif" font-weight="700" opacity="0.6">MECANUM</text>

  <!-- === WHEELS === -->

  <!-- Front-Left Wheel -->
  <g class="mecanum-wheel" style="transform-origin: 35px 105px;">
    <rect x="18" y="88" width="22" height="34" rx="6" fill="url(#wheelGrad)" stroke="#111" stroke-width="2"/>
    <!-- Rollers -->
    <line x1="22" y1="95" x2="36" y2="95" stroke="#666" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="102" x2="36" y2="102" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="109" x2="36" y2="109" stroke="#666" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="116" x2="36" y2="116" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    <!-- Hub -->
    <circle cx="29" cy="105" r="4" fill="#888" stroke="#555" stroke-width="1.5"/>
  </g>

  <!-- Front-Right Wheel -->
  <g class="mecanum-wheel" style="transform-origin: 225px 105px; animation-delay: 0.2s;">
    <rect x="220" y="88" width="22" height="34" rx="6" fill="url(#wheelGrad)" stroke="#111" stroke-width="2"/>
    <line x1="224" y1="95" x2="238" y2="95" stroke="#666" stroke-width="2" stroke-linecap="round"/>
    <line x1="224" y1="102" x2="238" y2="102" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    <line x1="224" y1="109" x2="238" y2="109" stroke="#666" stroke-width="2" stroke-linecap="round"/>
    <line x1="224" y1="116" x2="238" y2="116" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    <circle cx="231" cy="105" r="4" fill="#888" stroke="#555" stroke-width="1.5"/>
  </g>

  <!-- Back-Left Wheel -->
  <g class="mecanum-wheel" style="transform-origin: 35px 175px; animation-delay: 0.4s;">
    <rect x="18" y="158" width="22" height="34" rx="6" fill="url(#wheelGrad)" stroke="#111" stroke-width="2"/>
    <line x1="22" y1="165" x2="36" y2="165" stroke="#666" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="172" x2="36" y2="172" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="179" x2="36" y2="179" stroke="#666" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="186" x2="36" y2="186" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    <circle cx="29" cy="175" r="4" fill="#888" stroke="#555" stroke-width="1.5"/>
  </g>

  <!-- Back-Right Wheel -->
  <g class="mecanum-wheel" style="transform-origin: 225px 175px; animation-delay: 0.6s;">
    <rect x="220" y="158" width="22" height="34" rx="6" fill="url(#wheelGrad)" stroke="#111" stroke-width="2"/>
    <line x1="224" y1="165" x2="238" y2="165" stroke="#666" stroke-width="2" stroke-linecap="round"/>
    <line x1="224" y1="172" x2="238" y2="172" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    <line x1="224" y1="179" x2="238" y2="179" stroke="#666" stroke-width="2" stroke-linecap="round"/>
    <line x1="224" y1="186" x2="238" y2="186" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    <circle cx="231" cy="175" r="4" fill="#888" stroke="#555" stroke-width="1.5"/>
  </g>

  <!-- === LINE TRACKER (underside detail) === -->
  <rect x="100" y="195" width="60" height="8" rx="4" fill="#333" stroke="#222" stroke-width="1"/>
  <circle cx="110" cy="199" r="2.5" fill="#FF4444" opacity="0.6"/>
  <circle cx="130" cy="199" r="2.5" fill="#FF4444" opacity="0.6"/>
  <circle cx="150" cy="199" r="2.5" fill="#FF4444" opacity="0.6"/>

  <!-- Thinking dots (visible when thinking) -->
  <g class="thinking-dots" transform="translate(130, 240)">
    <circle class="thinking-dot" cx="-16" cy="0" r="5" fill="#A855F7"/>
    <circle class="thinking-dot" cx="0" cy="0" r="5" fill="#A855F7"/>
    <circle class="thinking-dot" cx="16" cy="0" r="5" fill="#A855F7"/>
  </g>

  <!-- Gear icon (visible when thinking) -->
  <g class="gear-icon" transform="translate(220, -20)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#A855F7" stroke-width="3"/>
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#A855F7" stroke-width="3" stroke-linecap="round"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#A855F7" stroke-width="3" stroke-linecap="round"/>
    <line x1="-11" y1="-11" x2="11" y2="11" stroke="#A855F7" stroke-width="3" stroke-linecap="round"/>
    <line x1="11" y1="-11" x2="-11" y2="11" stroke="#A855F7" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
