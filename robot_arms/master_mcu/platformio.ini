; Mira Master MCU — PlatformIO Configuration
; Board: ESP32-C3 Super Mini (USB serial bridge for swarm control)

[env:esp32c3]
platform = espressif32
board = lolin_c3_mini
framework = arduino

monitor_speed = 115200

; Enable native USB CDC serial on ESP32-C3
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -I include
